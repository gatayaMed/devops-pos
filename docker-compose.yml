version: '3.8'
services:
    app:
      build: .
      container_name: counter-app-v1010
      ports:
       - "5000:5000"
      volumes:
       - counter-data:/app/data:ro
      environment:
       - COUNT_FILE_PATH=/app/data/count.txt

      restart: unless-stopped

    #nginx as reverse proxy 
    nginx:
      image: nginx:alpine
      container_name: counter-nginx
      ports:
        - "80:80"
      volumes:
        - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      depends_on:
        - app
      restart: unless-stopped

volumes:
  counter-data: